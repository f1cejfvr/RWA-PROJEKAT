<div class="auth-container">
  <div class="auth-card">
    <h2>Prijavi se</h2>
    <p class="auth-subtitle">Dobrodošao nazad u PlayMate!</p>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        [(ngModel)]="email"
        placeholder="tvoj@email.com"
      />
    </div>

    <div class="form-group">
      <label for="password">Lozinka</label>
      <input
        type="password"
        id="password"
        [(ngModel)]="password"
        placeholder="••••••"
      />
    </div>

    <div *ngIf="error$ | async as error" class="error-message">
      {{ error }}
    </div>

    <button class="btn btn-primary btn-full" (click)="onSubmit()">
      Prijavi se
    </button>

    <p class="auth-footer">
      Nemaš nalog? <a routerLink="/register">Registruj se</a>
    </p>
  </div>
</div>
