<div class="auth-container">
  <div class="auth-card">
    <h2>Registruj se</h2>
    <p class="auth-subtitle">Pridruži se PlayMate zajednici!</p>

    <div class="form-group">
      <label for="username">Korisničko ime</label>
      <input
        type="text"
        id="username"
        [(ngModel)]="username"
        placeholder="tvojusername"
      />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        [(ngModel)]="email"
        placeholder="tvoj@email.com"
      />
    </div>

    <div class="form-group">
      <label for="password">Lozinka</label>
      <input
        type="password"
        id="password"
        [(ngModel)]="password"
        placeholder="minimum 6 karaktera"
      />
    </div>

    <div class="form-group">
      <label for="city">Grad</label>
      <input
        type="text"
        id="city"
        [(ngModel)]="city"
        placeholder="Beograd"
      />
    </div>

    <div class="form-group">
      <label for="type">Tip igrača</label>
      <select id="type" [(ngModel)]="type">
        <option value="both">Gamer i sportista</option>
        <option value="gamer">Samo gamer</option>
        <option value="sports">Samo sportista</option>
      </select>
    </div>

    <div *ngIf="error$ | async as error" class="error-message">
      {{ error }}
    </div>

    <button class="btn btn-primary btn-full" (click)="onSubmit()">
      Registruj se
    </button>

    <p class="auth-footer">
      Već imaš nalog? <a routerLink="/login">Prijavi se</a>
    </p>
  </div>
</div>
