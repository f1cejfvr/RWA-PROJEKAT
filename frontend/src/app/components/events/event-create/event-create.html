<div class="container">
  <div class="form-card">
    <h1>Kreiraj Event</h1>

    <div class="form-group">
      <label for="title">Naziv eventa *</label>
      <input type="text" id="title" [(ngModel)]="title" placeholder="npr. FIFA turnir" />
    </div>

    <div class="form-group">
      <label for="description">Opis</label>
      <textarea id="description" [(ngModel)]="description" rows="3" placeholder="Opiši event..."></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="category">Kategorija *</label>
        <select id="category" [(ngModel)]="category">
          <option value="gaming">Gaming</option>
          <option value="sports">Sport</option>
        </select>
      </div>

      <div class="form-group">
        <label for="type">Tip *</label>
        <select id="type" [(ngModel)]="type">
          <option value="casual">Casual</option>
          <option value="tournament">Turnir</option>
        </select>
      </div>
    </div>

    <div class="form-group" *ngIf="category === 'gaming'">
      <label for="game">Igrica</label>
      <input type="text" id="game" [(ngModel)]="game" placeholder="npr. League of Legends" />
    </div>

    <div class="form-group" *ngIf="category === 'sports'">
      <label for="sport">Sport</label>
      <input type="text" id="sport" [(ngModel)]="sport" placeholder="npr. Košarka" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="city">Grad</label>
        <input type="text" id="city" [(ngModel)]="city" placeholder="Beograd" />
      </div>

      <div class="form-group">
        <label for="maxPlayers">Maks. igrača *</label>
        <input type="number" id="maxPlayers" [(ngModel)]="maxPlayers" min="2" />
      </div>
    </div>

    <div class="form-group">
      <label for="location">Lokacija</label>
      <input type="text" id="location" [(ngModel)]="location" placeholder="Adresa ili online" />
    </div>

    <div class="form-group">
      <label for="date">Datum i vreme</label>
      <input type="datetime-local" id="date" [(ngModel)]="date" />
    </div>

    <div class="form-actions">
      <a routerLink="/events" class="btn btn-secondary">Otkaži</a>
      <button class="btn btn-primary" (click)="onSubmit()">Kreiraj event</button>
    </div>
  </div>
</div>
